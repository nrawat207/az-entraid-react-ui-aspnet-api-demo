trigger:
  branches:
    include:
    - main
    - develop
  paths:
    include:
    - frontend/**
    - bff/**
    - api/**
    - infra/**
    - azure-pipelines.yml
    - azure-pipelines.variables.yml

pr:
  branches:
    include:
    - main
    - develop

# pool:
#   vmImage: 'ubuntu-latest'

pool:
  name: Default   # self-hosted agent pool

variables:
- template: azure-pipelines.variables.yml

# variables:
# - group: entra-demo-dev-vars   # pulls in registryUsername, registryPassword, sqlAdminPasswordDev, etc.
# - name: dockerRegistryServiceConnection
#   value: 'AcrConnection'
# - name: containerRegistryName
#   value: 'entrademodevacr'
# - name: containerRegistry
#   value: '$(containerRegistryName).azurecr.io'
# - name: resourceGroupDev
#   value: 'entra-demo-dev-rg'
# - name: azureLocationDev
#   value: 'eastus'
# - name: sqlAdminUsernameDev
#   value: 'sqladmin'
# - name: imageRepository
#   value: 'entra-demo'
# - name: dockerfileFrontend
#   value: '$(Build.SourcesDirectory)/frontend/Dockerfile'
# - name: dockerfileBff
#   value: '$(Build.SourcesDirectory)/bff/Dockerfile'
# - name: dockerfileApi
#   value: '$(Build.SourcesDirectory)/api/Dockerfile'
# - name: tag
#   value: '$(Build.BuildId)'
# - name: vmImageName
#   value: 'ubuntu-latest'
# - name: buildConfiguration
#   value: 'Release'
# - name: workingDirectory
#   value: '$(System.DefaultWorkingDirectory)'


stages:

# ============================================================================
# STAGE 0: VALIDATE INFRASTRUCTURE (Dev)
# ============================================================================
- stage: ValidateInfra
  displayName: 'Validate Infrastructure'
  condition: or(eq(variables['Build.SourceBranch'], 'refs/heads/develop'), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - job: ValidateBicep
    displayName: 'Validate Bicep Templates'
    steps:
    
    - checkout: self
    
    - task: AzureCLI@2
      displayName: 'Register required Azure providers'
      inputs:
        azureSubscription: 'AzureServiceConnection'
        scriptType: 'ps'
        scriptLocation: 'inlineScript'
        inlineScript: |
          Write-Host "Registering Azure resource providers..."
          
          # Register OperationalInsights provider
          az provider register --namespace Microsoft.OperationalInsights
          
          # Register other required providers
          az provider register --namespace Microsoft.ContainerRegistry
          az provider register --namespace Microsoft.ContainerService
          az provider register --namespace Microsoft.Sql
          az provider register --namespace Microsoft.KeyVault
          az provider register --namespace Microsoft.Insights
          
          Write-Host "Waiting for provider registrations to complete..."
          Start-Sleep -Seconds 5
          
          Write-Host "[OK] Azure providers registered" -ForegroundColor Green
    
    - task: AzureCLI@2
      displayName: 'Validate Bicep - Dev'
      inputs:
        azureSubscription: 'AzureServiceConnection'
        scriptType: 'ps'
        scriptLocation: 'inlineScript'
        inlineScript: |
          Write-Host "Validating Bicep templates for development environment..."
          
          az deployment group validate `
            --resource-group "$(resourceGroupDev)" `
            --template-file "infra/main.bicep" `
            --parameters "infra/main.bicepparam" `
            --parameters `
              location="$(azureLocationDev)" `
              environment="dev" `
              projectName="entra-demo" `
              imageRepository="$(imageRepository)" `
              registryUsername="$(registryUsername)" `
              registryPassword="$(registryPassword)" `
              sqlAdminUsername="$(sqlAdminUsernameDev)" `
              sqlAdminPassword="$(sqlAdminPasswordDev)" `
              useExistingRegistry=true `
              existingRegistryName="entrademodevacr" `
              existingRegistryUrl="entrademodevacr.azurecr.io"
          
          if ($LASTEXITCODE -eq 0) {
            Write-Host "[OK] Bicep validation successful - no syntax errors" -ForegroundColor Green
          } else {
            Write-Host "[FAILED] Bicep validation failed" -ForegroundColor Red
            exit 1
          }

# ============================================================================
# STAGE 1: WHAT-IF (Preview Changes)
# ============================================================================
- stage: WhatIfInfra
  displayName: 'Preview Infrastructure Changes (What-If)'
  dependsOn: ValidateInfra
  condition: succeeded()
  jobs:
  - job: WhatIfDeploy
    displayName: 'What-If Analysis - Dev'
    steps:
    
    - checkout: self
    
    - task: AzureCLI@2
      displayName: 'Run What-If - Dev'
      inputs:
        azureSubscription: 'AzureServiceConnection'
        scriptType: 'ps'
        scriptLocation: 'inlineScript'
        inlineScript: |
          Write-Host "Analyzing what changes will be made to development infrastructure..."
          
          az deployment group what-if `
            --resource-group "$(resourceGroupDev)" `
            --template-file "infra/main.bicep" `
            --parameters "infra/main.bicepparam" `
            --parameters `
              location="$(azureLocationDev)" `
              environment="dev" `
              projectName="entra-demo" `
              imageRepository="$(imageRepository)" `
              registryUsername="$(registryUsername)" `
              registryPassword="$(registryPassword)" `
              sqlAdminUsername="$(sqlAdminUsernameDev)" `
              sqlAdminPassword="$(sqlAdminPasswordDev)" `
              useExistingRegistry=true `
              existingRegistryName="entrademodevacr" `
              existingRegistryUrl="entrademodevacr.azurecr.io"
          
          Write-Host ""
          Write-Host "What-If Summary: Review changes above before deployment"

# ============================================================================
# STAGE 2: BUILD & TEST
# ============================================================================
- stage: BuildAndTest
  displayName: 'Build & Test'
  dependsOn: WhatIfInfra
  condition: succeeded()
  jobs:

  # ---- Frontend Build ----
  - job: BuildFrontend
    displayName: 'Build Frontend'
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '20.x'
      displayName: 'Install Node.js'

    - script: |
        cd frontend
        npm ci
      displayName: 'Install dependencies'

    - script: |
        cd frontend
        npm run lint || true
      displayName: 'Run ESLint'

    - script: |
        cd frontend
        npm run build
      displayName: 'Build React app'

    - publish: $(System.DefaultWorkingDirectory)/frontend/dist
      artifact: frontend-dist
      displayName: 'Publish frontend artifact'

  # ---- BFF Build ----
  - job: BuildBff
    displayName: 'Build BFF'
    steps:
    - task: UseDotNet@2
      inputs:
        version: '10.0.x'
        packageType: 'sdk'
      displayName: 'Install .NET 10 SDK'

    - script: |
        cd bff
        dotnet restore
      displayName: 'Restore dependencies'

    - script: |
        cd bff
        dotnet build --configuration $(buildConfiguration) --no-restore
      displayName: 'Build solution'

    - script: |
        cd bff
        dotnet test --configuration $(buildConfiguration) --no-build --verbosity normal || true
      displayName: 'Run unit tests'

    - script: |
        cd bff
        dotnet publish --configuration $(buildConfiguration) --no-build --output $(Build.ArtifactStagingDirectory)/bff
      displayName: 'Publish BFF'

    - publish: $(Build.ArtifactStagingDirectory)/bff
      artifact: bff-publish
      displayName: 'Publish BFF artifact'

  # ---- API Build ----
  - job: BuildApi
    displayName: 'Build API'
    steps:
    - task: UseDotNet@2
      inputs:
        version: '10.0.x'
        packageType: 'sdk'
      displayName: 'Install .NET 10 SDK'

    - script: |
        cd api
        dotnet restore
      displayName: 'Restore dependencies'

    - script: |
        cd api
        dotnet build --configuration $(buildConfiguration) --no-restore
      displayName: 'Build solution'

    - script: |
        cd api
        dotnet test --configuration $(buildConfiguration) --no-build --verbosity normal || true
      displayName: 'Run unit tests'

    - script: |
        cd api
        dotnet publish --configuration $(buildConfiguration) --no-build --output $(Build.ArtifactStagingDirectory)/api
      displayName: 'Publish API'

    - publish: $(Build.ArtifactStagingDirectory)/api
      artifact: api-publish
      displayName: 'Publish API artifact'

# ============================================================================
# STAGE 3: BUILD DOCKER IMAGES & PUSH TO ACR
# ============================================================================
- stage: BuildAndPushDocker
  displayName: 'Build & Push Docker Images'
  dependsOn: BuildAndTest
  condition: succeeded()

  jobs:
  - job: BuildPushImages
    displayName: 'Build & Push to ACR'
    steps:

    - download: current
      artifact: frontend-dist
      displayName: 'Download frontend dist'

    - download: current
      artifact: bff-publish
      displayName: 'Download BFF publish'

    - download: current
      artifact: api-publish
      displayName: 'Download API publish'

    # Connect to ACR
    - task: Docker@2
      displayName: 'Login to ACR'
      inputs:
        command: 'login'
        containerRegistry: 'AcrConnection'

    # Build and push frontend image
    - task: Docker@2
      displayName: 'Build & push frontend image'
      inputs:
        command: 'buildAndPush'
        containerRegistry: 'AcrConnection'
        repository: '$(imageRepository)/frontend'
        Dockerfile: '$(dockerfileFrontend)'
        buildContext: '$(Build.SourcesDirectory)'
        tags: |
          $(tag)
          latest
          $(Build.SourceBranchName)-$(Build.BuildId)

    # Build and push BFF image
    - task: Docker@2
      displayName: 'Build & push BFF image'
      inputs:
        command: 'buildAndPush'
        containerRegistry: 'AcrConnection'
        repository: '$(imageRepository)/bff'
        Dockerfile: '$(dockerfileBff)'
        buildContext: '$(Build.SourcesDirectory)'
        tags: |
          $(tag)
          latest
          $(Build.SourceBranchName)-$(Build.BuildId)

    # Build and push API image
    - task: Docker@2
      displayName: 'Build & push API image'
      inputs:
        command: 'buildAndPush'
        containerRegistry: 'AcrConnection'
        repository: '$(imageRepository)/api'
        Dockerfile: '$(dockerfileApi)'
        buildContext: '$(Build.SourcesDirectory)'
        tags: |
          $(tag)
          latest
          $(Build.SourceBranchName)-$(Build.BuildId)

# ============================================================================
# STAGE 4: DEPLOY TO DEVELOPMENT
# ============================================================================
- stage: DeployToDev
  displayName: 'Deploy to Development'
  dependsOn: BuildAndPushDocker
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))

  jobs:
  - deployment: DeployContainerApps
    displayName: 'Deploy Container Apps (Dev)'
    environment: 'development'
    strategy:
      runOnce:
        deploy:
          steps:

          - checkout: self

          - task: AzureCLI@2
            displayName: 'Deploy Bicep infrastructure'
            inputs:
              azureSubscription: 'AzureServiceConnection'
              scriptType: 'ps'
              scriptLocation: 'inlineScript'
              inlineScript: |
                # Validate required variables
                $requiredVars = @(
                  "REGISTRY_USERNAME",
                  "REGISTRY_PASSWORD",
                  "SQL_ADMIN_USERNAME",
                  "SQL_ADMIN_PASSWORD"
                )
                
                foreach ($varName in $requiredVars) {
                  $varValue = [System.Environment]::GetEnvironmentVariable($varName)
                  if ([string]::IsNullOrEmpty($varValue)) {
                    Write-Host "Missing required pipeline variable: $varName" -ForegroundColor Red
                    exit 1
                  }
                }
                
                Write-Host "All required variables present, proceeding with deployment..." -ForegroundColor Green
                
                az deployment group create `
                  --resource-group "$(resourceGroupDev)" `
                  --template-file "infra/main.bicep" `
                  --parameters "infra/main.bicepparam" `
                  --parameters `
                    location="$(azureLocationDev)" `
                    environment="dev" `
                    projectName="entra-demo" `
                    imageRepository="$(imageRepository)" `
                    registryUsername="$env:REGISTRY_USERNAME" `
                    registryPassword="$env:REGISTRY_PASSWORD" `
                    sqlAdminUsername="$env:SQL_ADMIN_USERNAME" `
                    sqlAdminPassword="$env:SQL_ADMIN_PASSWORD" `
                    useExistingRegistry=true `
                    existingRegistryName="entrademodevacr" `
                    existingRegistryUrl="entrademodevacr.azurecr.io"
                
                if ($LASTEXITCODE -eq 0) {
                  Write-Host "[OK] Bicep deployment successful" -ForegroundColor Green
                } else {
                  Write-Host "[FAILED] Bicep deployment failed" -ForegroundColor Red
                  exit 1
                }
            env:
              REGISTRY_USERNAME: $(registryUsername)
              REGISTRY_PASSWORD: $(registryPassword)
              SQL_ADMIN_USERNAME: $(sqlAdminUsernameDev)
              SQL_ADMIN_PASSWORD: $(sqlAdminPasswordDev)

          - task: AzureCLI@2
            displayName: 'Update Container Apps images'
            inputs:
              azureSubscription: 'AzureServiceConnection'
              scriptType: 'ps'
              scriptLocation: 'inlineScript'
              inlineScript: |
                $registry = "$(containerRegistry)"
                $imageTag = "$(tag)"
                $resourceGroup = "$(resourceGroupDev)"
                $imageRepository = "$(imageRepository)"
                
                Write-Host "Updating container apps with image tag: $imageTag" -ForegroundColor Cyan
                
                # Update frontend
                Write-Host "Updating frontend..."
                az containerapp update `
                  --name "frontend-dev" `
                  --resource-group "$resourceGroup" `
                  --image "$registry/$imageRepository/frontend:$imageTag"
                
                # Update BFF
                Write-Host "Updating BFF..."
                az containerapp update `
                  --name "bff-dev" `
                  --resource-group "$resourceGroup" `
                  --image "$registry/$imageRepository/bff:$imageTag"
                
                # Update API
                Write-Host "Updating API..."
                az containerapp update `
                  --name "api-dev" `
                  --resource-group "$resourceGroup" `
                  --image "$registry/$imageRepository/api:$imageTag"
                
                if ($LASTEXITCODE -eq 0) {
                  Write-Host "[OK] Container apps updated successfully" -ForegroundColor Green
                } else {
                  Write-Host "[FAILED] Container apps update failed" -ForegroundColor Red
                  exit 1
                }

          - task: AzureCLI@2
            displayName: 'Verify Container Apps health'
            inputs:
              azureSubscription: 'AzureServiceConnection'
              scriptType: 'ps'
              scriptLocation: 'inlineScript'
              inlineScript: |
                Write-Host "Checking BFF health..." -ForegroundColor Cyan
                $bffUrl = az containerapp show `
                  --name "bff-dev" `
                  --resource-group "$(resourceGroupDev)" `
                  --query "properties.configuration.ingress.fqdn" -o tsv
                
                Write-Host "BFF URL: https://$bffUrl/health"
                try {
                  $response = Invoke-WebRequest -Uri "https://$bffUrl/health" -UseBasicParsing -ErrorAction Stop
                  if ($response.StatusCode -eq 200) {
                    Write-Host "[OK] BFF health check passed" -ForegroundColor Green
                  } else {
                    Write-Host "[FAILED] BFF health check failed with status $($response.StatusCode)" -ForegroundColor Red
                    exit 1
                  }
                } catch {
                  Write-Host "[FAILED] BFF health check failed: $_" -ForegroundColor Red
                  exit 1
                }
                
                Write-Host "Checking API container app state..." -ForegroundColor Cyan
                $apiState = az containerapp show `
                  --name "api-dev" `
                  --resource-group "$(resourceGroupDev)" `
                  --query "properties.provisioningState" -o tsv
                
                Write-Host "API provisioning state: $apiState"
                if ($apiState -eq "Succeeded") {
                  Write-Host "[OK] API provisioning succeeded" -ForegroundColor Green
                } else {
                  Write-Host "[FAILED] API provisioning failed (state: $apiState)" -ForegroundColor Red
                  exit 1
                }

