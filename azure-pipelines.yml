trigger:
  branches:
    include:
    - main
    - develop
  paths:
    include:
    - frontend/**
    - bff/**
    - api/**
    - infra/**
    - azure-pipelines.yml

pr:
  branches:
    include:
    - main
    - develop

pool:
  vmImage: 'ubuntu-latest'

variables:
  dockerRegistryServiceConnection: 'AcrConnection'
  imageRepository: 'entra-demo'
  containerRegistry: '$(containerRegistryName).azurecr.io'
  dockerfileFrontend: '$(Build.SourcesDirectory)/frontend/Dockerfile'
  dockerfileBff: '$(Build.SourcesDirectory)/bff/Dockerfile'
  dockerfileApi: '$(Build.SourcesDirectory)/api/Dockerfile'
  tag: '$(Build.BuildId)'
  vmImageName: 'ubuntu-latest'
  buildConfiguration: 'Release'
  workingDirectory: '$(System.DefaultWorkingDirectory)'

stages:

# ============================================================================
# STAGE 1: BUILD & TEST
# ============================================================================
- stage: BuildAndTest
  displayName: 'Build & Test'
  jobs:
  
  # ---- Frontend Build ----
  - job: BuildFrontend
    displayName: 'Build Frontend'
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '20.x'
      displayName: 'Install Node.js'
    
    - script: |
        cd frontend
        npm ci
      displayName: 'Install dependencies'
    
    - script: |
        cd frontend
        npm run lint
      displayName: 'Run ESLint'
      continueOnError: true
    
    - script: |
        cd frontend
        npm run build
      displayName: 'Build React app'
    
    - publish: $(System.DefaultWorkingDirectory)/frontend/dist
      artifact: frontend-dist
      displayName: 'Publish frontend artifact'

  # ---- BFF Build ----
  - job: BuildBff
    displayName: 'Build BFF'
    steps:
    - task: UseDotNet@2
      inputs:
        version: '10.0.x'
        packageType: 'sdk'
      displayName: 'Install .NET 10 SDK'
    
    - script: |
        cd bff
        dotnet restore
      displayName: 'Restore dependencies'
    
    - script: |
        cd bff
        dotnet build --configuration $(buildConfiguration) --no-restore
      displayName: 'Build solution'
    
    - script: |
        cd bff
        dotnet test --configuration $(buildConfiguration) --no-build --verbosity normal
      displayName: 'Run unit tests'
      continueOnError: true
    
    - script: |
        cd bff
        dotnet publish --configuration $(buildConfiguration) --no-build --output $(Build.ArtifactStagingDirectory)/bff
      displayName: 'Publish BFF'
    
    - publish: $(Build.ArtifactStagingDirectory)/bff
      artifact: bff-publish
      displayName: 'Publish BFF artifact'

  # ---- API Build ----
  - job: BuildApi
    displayName: 'Build API'
    steps:
    - task: UseDotNet@2
      inputs:
        version: '10.0.x'
        packageType: 'sdk'
      displayName: 'Install .NET 10 SDK'
    
    - script: |
        cd api
        dotnet restore
      displayName: 'Restore dependencies'
    
    - script: |
        cd api
        dotnet build --configuration $(buildConfiguration) --no-restore
      displayName: 'Build solution'
    
    - script: |
        cd api
        dotnet test --configuration $(buildConfiguration) --no-build --verbosity normal
      displayName: 'Run unit tests'
      continueOnError: true
    
    - script: |
        cd api
        dotnet publish --configuration $(buildConfiguration) --no-build --output $(Build.ArtifactStagingDirectory)/api
      displayName: 'Publish API'
    
    - publish: $(Build.ArtifactStagingDirectory)/api
      artifact: api-publish
      displayName: 'Publish API artifact'

# ============================================================================
# STAGE 2: BUILD DOCKER IMAGES & PUSH TO ACR
# ============================================================================
- stage: BuildAndPushDocker
  displayName: 'Build & Push Docker Images'
  dependsOn: BuildAndTest
  condition: succeeded()
  
  jobs:
  - job: BuildPushImages
    displayName: 'Build & Push to ACR'
    steps:
    
    - download: current
      artifact: frontend-dist
      displayName: 'Download frontend dist'
    
    - download: current
      artifact: bff-publish
      displayName: 'Download BFF publish'
    
    - download: current
      artifact: api-publish
      displayName: 'Download API publish'
    
    # Connect to ACR
    - task: Docker@2
      displayName: 'Login to ACR'
      inputs:
        command: login
        containerRegistry: $(dockerRegistryServiceConnection)
    
    # Build and push frontend image
    - task: Docker@2
      displayName: 'Build & push frontend image'
      inputs:
        command: buildAndPush
        repository: '$(imageRepository)/frontend'
        dockerfile: $(dockerfileFrontend)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
          latest
          $(Build.SourceBranchName)-$(Build.BuildId)
    
    # Build and push BFF image
    - task: Docker@2
      displayName: 'Build & push BFF image'
      inputs:
        command: buildAndPush
        repository: '$(imageRepository)/bff'
        dockerfile: $(dockerfileBff)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
          latest
          $(Build.SourceBranchName)-$(Build.BuildId)
    
    # Build and push API image
    - task: Docker@2
      displayName: 'Build & push API image'
      inputs:
        command: buildAndPush
        repository: '$(imageRepository)/api'
        dockerfile: $(dockerfileApi)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
          latest
          $(Build.SourceBranchName)-$(Build.BuildId)

# ============================================================================
# STAGE 3: DEPLOY TO DEVELOPMENT
# ============================================================================
- stage: DeployToDev
  displayName: 'Deploy to Development'
  dependsOn: BuildAndPushDocker
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/develop'))
  
  jobs:
  - deployment: DeployContainerApps
    displayName: 'Deploy Container Apps (Dev)'
    environment: 'development'
    strategy:
      runOnce:
        deploy:
          steps:
          
          - checkout: self
          
          - task: AzureCLI@2
            displayName: 'Deploy Bicep infrastructure'
            inputs:
              azureSubscription: 'AzureServiceConnection'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az deployment group create \
                  --resource-group $(resourceGroupDev) \
                  --template-file infra/main.bicep \
                  --parameters infra/main.bicepparam \
                  --parameters \
                    location=$(azureLocationDev) \
                    environment=dev \
                    projectName=entra-demo \
                    registryUsername=$(registryUsername) \
                    registryPassword=$(registryPassword) \
                    sqlAdminUsername=$(sqlAdminUsernameDev) \
                    sqlAdminPassword=$(sqlAdminPasswordDev)
          
          - task: AzureCLI@2
            displayName: 'Update Container Apps images'
            inputs:
              azureSubscription: 'AzureServiceConnection'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                REGISTRY=$(containerRegistry)
                IMAGE_TAG=$(tag)
                
                # Update frontend
                az containerapp update \
                  --name frontend-dev \
                  --resource-group $(resourceGroupDev) \
                  --image $REGISTRY/$(imageRepository)/frontend:$IMAGE_TAG
                
                # Update BFF
                az containerapp update \
                  --name bff-dev \
                  --resource-group $(resourceGroupDev) \
                  --image $REGISTRY/$(imageRepository)/bff:$IMAGE_TAG
                
                # Update API
                az containerapp update \
                  --name api-dev \
                  --resource-group $(resourceGroupDev) \
                  --image $REGISTRY/$(imageRepository)/api:$IMAGE_TAG
          
          - task: AzureCLI@2
            displayName: 'Verify Container Apps health'
            inputs:
              azureSubscription: 'AzureServiceConnection'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                echo "Checking BFF health..."
                BFF_URL=$(az containerapp show --name bff-dev --resource-group $(resourceGroupDev) \
                  --query "properties.configuration.ingress.fqdn" -o tsv)
                curl -f https://$BFF_URL/health || exit 1
                
                echo "Checking API health..."
                API_URL=$(az containerapp show --name api-dev --resource-group $(resourceGroupDev) \
                  --query "properties.configuration.ingress.fqdn" -o tsv)
                curl -f http://$API_URL/health || exit 1

# ============================================================================
# STAGE 4: DEPLOY TO PRODUCTION
# ============================================================================
- stage: DeployToProd
  displayName: 'Deploy to Production'
  dependsOn: BuildAndPushDocker
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  
  jobs:
  - deployment: DeployContainerAppsProd
    displayName: 'Deploy Container Apps (Prod)'
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          
          - checkout: self
          
          - task: AzureCLI@2
            displayName: 'Deploy Bicep infrastructure'
            inputs:
              azureSubscription: 'AzureServiceConnectionProd'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az deployment group create \
                  --resource-group $(resourceGroupProd) \
                  --template-file infra/main.bicep \
                  --parameters infra/main.bicepparam \
                  --parameters \
                    location=$(azureLocationProd) \
                    environment=prod \
                    projectName=entra-demo \
                    registryUsername=$(registryUsername) \
                    registryPassword=$(registryPassword) \
                    sqlAdminUsername=$(sqlAdminUsernameProd) \
                    sqlAdminPassword=$(sqlAdminPasswordProd)
          
          - task: AzureCLI@2
            displayName: 'Update Container Apps images (Prod)'
            inputs:
              azureSubscription: 'AzureServiceConnectionProd'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                REGISTRY=$(containerRegistry)
                IMAGE_TAG=$(tag)
                
                # Update frontend
                az containerapp update \
                  --name frontend-prod \
                  --resource-group $(resourceGroupProd) \
                  --image $REGISTRY/$(imageRepository)/frontend:$IMAGE_TAG
                
                # Update BFF
                az containerapp update \
                  --name bff-prod \
                  --resource-group $(resourceGroupProd) \
                  --image $REGISTRY/$(imageRepository)/bff:$IMAGE_TAG
                
                # Update API
                az containerapp update \
                  --name api-prod \
                  --resource-group $(resourceGroupProd) \
                  --image $REGISTRY/$(imageRepository)/api:$IMAGE_TAG
          
          - task: AzureCLI@2
            displayName: 'Verify Container Apps health (Prod)'
            inputs:
              azureSubscription: 'AzureServiceConnectionProd'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                echo "Checking BFF health..."
                BFF_URL=$(az containerapp show --name bff-prod --resource-group $(resourceGroupProd) \
                  --query "properties.configuration.ingress.fqdn" -o tsv)
                curl -f https://$BFF_URL/health || exit 1
                
                echo "Checking API health..."
                API_URL=$(az containerapp show --name api-prod --resource-group $(resourceGroupProd) \
                  --query "properties.configuration.ingress.fqdn" -o tsv)
                curl -f http://$API_URL/health || exit 1
