# Azure Pipeline Variables Template
# Use this to configure environment-specific values
# Reference: https://learn.microsoft.com/azure/devops/pipelines/process/variables

# ============================================================================
# CONTAINER REGISTRY
# ============================================================================
variables:
- name: containerRegistryName
  value: 'entrademodevacr'  # ACR name (without .azurecr.io)
- name: registryUsername
  value: ''  # Set via Azure DevOps secret variables
- name: registryPassword
  value: ''  # Set via Azure DevOps secret variables

# ============================================================================
# DEVELOPMENT ENVIRONMENT
# ============================================================================
# Azure Subscription
- name: resourceGroupDev
  value: 'entra-demo-dev-rg'
- name: azureLocationDev
  value: 'eastus'
- name: subscriptionNameDev
  value: 'Azure subscription 1'
  
# SQL Admin
- name: sqlAdminUsernameDev
  value: 'sqladmin'
- name: sqlAdminPasswordDev
  value: ''  # Set via secret variable

# ============================================================================
# PRODUCTION ENVIRONMENT
# ============================================================================
# Azure Subscription
- name: resourceGroupProd
  value: 'entra-demo-prod-rg'
- name: azureLocationProd
  value: 'eastus'
- name: subscriptionNameProd
  value: 'Azure subscription 1'
  
# SQL Admin
- name: sqlAdminUsernameProd
  value: 'prodadmin'
- name: sqlAdminPasswordProd
  value: ''  # Set via secret variable

# ============================================================================
# IMAGE NAMING
# ============================================================================
- name: imageRepository
  value: 'entra-demo'
- name: frontendImage
  value: 'entra-demo/frontend'
- name: bffImage
  value: 'entra-demo/bff'
- name: apiImage
  value: 'entra-demo/api'

# ============================================================================
# BUILD SETTINGS
# ============================================================================
- name: buildConfiguration
  value: 'Release'
- name: dotnetVersion_net8
  value: '8.0.x'
- name: dotnetVersion_net10
  value: '10.0.x'
- name: nodeVersion
  value: '20.x'
